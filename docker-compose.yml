version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: wa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wa
      POSTGRES_PASSWORD: wapassword
      POSTGRES_DB: wa_atendimento
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wa -d wa_atendimento"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - wa_network

  redis:
    image: redis:7-alpine
    container_name: wa_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ""
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - wa_network

  minio:
    image: minio/minio:latest
    container_name: wa_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - wa_network

  minio-init:
    image: minio/mc:latest
    container_name: wa_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123 &&
        mc mb --ignore-existing local/whatsapp-media &&
        mc anonymous set download local/whatsapp-media &&
        echo 'MinIO bucket created successfully'
      "
    networks:
      - wa_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  wa_network:
    driver: bridge
